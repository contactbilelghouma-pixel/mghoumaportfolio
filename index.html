<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - Mohamed</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#0f172a;
      color:white;
    }
    header{
      text-align:center;
      padding:60px 20px;
    }
    h1{
      font-size:48px;
      margin-bottom:10px;
    }
    p{
      color:#cbd5e1;
    }
    .container{
      max-width:1100px;
      margin:auto;
      padding:20px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    }
    .card{
      background:#1e293b;
      border-radius:16px;
      padding:20px;
      transition:0.3s;
    }
    .card:hover{
      transform:translateY(-5px);
    }
    .btn{
      display:inline-block;
      margin-top:15px;
      padding:12px 18px;
      background:white;
      color:black;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
    }
    footer{
      text-align:center;
      padding:40px 20px;
      color:#94a3b8;
    }
  </style>
</head>
<body>

<header>
  <h1>Mohamed GHOUMA - Portfolio</h1>
  <p>Mes projets web et applications</p>
</header>

<section class="container">

  <div class="card">
    <h2>Projet 1</h2>
    <p>Application moderne développée avec React.</p>
    <a class="btn" href="https://example.com" target="_blank">Voir le site</a>
  </div>

  <div class="card">
    <h2>Projet 2</h2>
    <p>Plateforme SaaS avec dashboard.</p>
    <a class="btn" href="https://example.com" target="_blank">Voir le site</a>
  </div>

  <div class="card">
    <h2>Projet 3</h2>
    <p>Site vitrine responsive.</p>
    <a class="btn" href="https://example.com" target="_blank">Voir le site</a>
  </div>

</section>

<footer>
  © 2026 Mohamed - Portfolio
</footer>

</body>
</html>
